  # ---------------------------------------------------------------------------
  # Decision rules
  # ---------------------------------------------------------------------------
  decision_rules:
  - id: RULE-CHOICE-001
    statement: >
      For each required delivery surface, choose the highest-preference stack whose cell support_level is 'preferred' or 'allowed'. Refer to stack_preference_order in preferences section.
    example: >
      For SPA: prefer stack.react_node_ts_js (preferred) over stack.python (allowed).

  - id: RULE-CHOICE-002
    statement: >
      If no stack is 'preferred' or 'allowed' for a required surface, select the best 'exception' option and flag for architecture approval.

  - id: RULE-CHOICE-003
    statement: >
      Always include all global_standards.required plus the selected cell's required_standards_additional in the solution's standards output.

  - id: RULE-CHOICE-004
    statement: >
      For multi-surface solutions (e.g., SPA + Mobile), prefer architectures that allow shared backend/API standards while allowing per-surface UI standards.

  - id: RULE-CHOICE-005
    statement: >
      When selecting databases, prefer PostgreSQL 14+ as primary RDBMS. Azure Cosmos DB should be used for NoSQL, caching, and session storage.

  - id: RULE-CHOICE-006
    statement: >
      For authentication, prefer JWT for stateless APIs. Use OAuth 2.0 + OpenID Connect for SSO. Microsoft Entra ID (Azure AD) is primary identity provider.

  - id: RULE-OUTPUT-001
    statement: >
      Output must include: (1) selected stack per surface with cell_id reference, (2) all applicable standards (by ID + title), (3) approved technologies per selected cells, (4) architecture approach, (5) exceptions/risks section.

  # ---------------------------------------------------------------------------
  # Exception process
  # ---------------------------------------------------------------------------
  exception_process:
    summary: >
      Any 'exception' or 'not_supported' selection requires architecture review approval before implementation.

    required_artifacts:
    - name: "Architecture Decision Record (ADR)"
      description: "Document decision, context, alternatives, rationale"

    - name: "Security review notes"
      description: "For security-sensitive changes"

    - name: "TECH_STACK_DECISION.md"
      description: "Project-level technology decisions documentation"

    approval_requirements:
    - level: "Architecture Review"
      required_for:
      - "Any stack with support_level: exception"
      - "Any stack with support_level: not_supported"
      - "NoSQL databases beyond Azure Cosmos DB"
      - "Native mobile development (Swift/Kotlin)"
      approvers: [ "Enterprise Architecture Team" ]

    - level: "Security Approval"
      required_for:
      - "Changes to authentication/authorization"
      - "Changes to secrets management"
      approvers: [ "Security Team" ]

    timeline:
    - "Architecture review: 5-10 business days"
    - "Security review: 3-5 business days"

    escalation:
      contact: "enterprise-architecture@sce.com"
      slack: "#architecture-standards"

  # ---------------------------------------------------------------------------
  # Deprecation
  # ---------------------------------------------------------------------------
  deprecation:
    technologies_deprecated:
    - name: "Java Stack"
      status: "Fully deprecated"
      action: "Migrate to Python, .NET, or React+Node"
      deadline: "2026-12-31"
      rationale: "Not in approved matrix; limited use cases at SCE"

    - name: "Node.js <18"
      status: "Deprecated"
      action: "Upgrade to Node.js 18+ LTS or 20+ LTS"
      deadline: "2026-06-30"

  # ---------------------------------------------------------------------------
  # Maintenance
  # ---------------------------------------------------------------------------
  maintenance:
    review_cycle: "Quarterly"
    next_review: "2026-04-15"

    contact:
      email: "enterprise-architecture@sce.com"
      slack: "#architecture-standards"

    version_history:
    - version: "3.1.0"
      date: "2026-01-21"
      author: "Enterprise Architecture Team"
      changes: >
        Added 7 new global standards from Cybersecurity Administrative Standard v9 alignment: STD-VULN-001 (Vulnerability Management), STD-ASSET-001 (Asset Management/CMDB), STD-DATA-001 (Data Security/Encryption), STD-CONFIG-001 (Configuration Management), STD-PATCH-001 (Software/Hardware Maintenance), STD-SDLC-001 (Secure SDLC), STD-SUPPLY-001 (Supply Chain Security). Enhanced STD-OBS-001 with logging review requirements.

    - version: "3.0.0"
      date: "2026-01-21"
      author: "Enterprise Architecture Team"
      changes: >
        Major restructuring: Split Web into SPA/WebApp, removed Desktop, added Windows App, renamed Voice to AI/Voice, removed Java stack, added Swift stack for iOS. Matrix now 4 stacks × 5 surfaces = 20 cells matching whiteboard design.

    - version: "2.1.0"
      date: "2026-01-21"
      author: "Enterprise Architecture Team"
      changes: "Updated NoSQL database from Redis to Azure Cosmos DB"

    - version: "2.0.0"
      date: "2026-01-21"
      author: "Enterprise Architecture Team"
      changes: "Converted to YAML matrix format from markdown"
